    date: "2026-04-01"
    author: "merge-amendment"
    description: "Merge UX-008-M03: adicionadas actions update_param e delete_param ao params-tab (V-M01)."
  - version: "1.0.0"
    date: "2026-03-15"
    author: "arquitetura"
    description: "Criação inicial. Extensão de UX-ROTINA-001 com abas HTTP, Mapeamentos e Parâmetros."
