# =============================================================================
# docker-compose.prod.yml — EasyCodeFramework Production
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  # ---------- Banco de Dados ----------
  postgres:
    image: postgres:17-alpine
    container_name: ${PROJECT_NAME:-ecf}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ecf}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Cache / Fila ----------
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-ecf}-redis
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- API (Fastify) ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ${PROJECT_NAME:-ecf}-api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ecf}
      REDIS_URL: redis://redis:6379
    networks:
      - internal
      - proxy-nw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Frontend (Vite + Nginx) ----------
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ${PROJECT_NAME:-ecf}-web
    ports:
      - "8080:80"
    networks:
      - proxy-nw
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  proxy-nw:
    external: true

volumes:
  pg-data:
    driver: local
