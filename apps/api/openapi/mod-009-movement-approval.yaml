openapi: 3.1.0
info:
  title: ECF — Movement Approval Module (MOD-009)
  version: 1.0.0
  description: |
    Movement Approval module API — control rules, approval chains,
    movement engine, and approval decisions.
  contact:
    name: ECF Team

servers:
  - url: /api/v1
    description: API v1

security:
  - bearerAuth: []

tags:
  - name: approval
    description: Movement approval and control rules management

paths:
  # ─── Control Rules ─────────────────────────────────────────────────────────

  /control-rules:
    get:
      operationId: approval_control_rules_list
      summary: List control rules
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ControlRuleStatus"
        - name: object_type
          in: query
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Paginated list of control rules
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListControlRulesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      operationId: approval_control_rules_create
      summary: Create a control rule
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateControlRuleBody"
      responses:
        "201":
          description: Control rule created
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlRuleItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /control-rules/{id}:
    patch:
      operationId: approval_control_rules_update
      summary: Update a control rule
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateControlRuleBody"
      responses:
        "200":
          description: Control rule updated
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlRuleItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /control-rules/{controlRuleId}/approval-rules:
    post:
      operationId: approval_approval_rules_create
      summary: Create an approval rule for a control rule
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: controlRuleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalRuleBody"
      responses:
        "201":
          description: Approval rule created
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRuleItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /approval-rules/{id}:
    patch:
      operationId: approval_approval_rules_update
      summary: Update an approval rule
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApprovalRuleBody"
      responses:
        "200":
          description: Approval rule updated
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRuleItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ─── Engine ────────────────────────────────────────────────────────────────

  /movement-engine/evaluate:
    post:
      operationId: approval_engine_evaluate
      summary: Evaluate whether an operation requires approval
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateBody"
      responses:
        "200":
          description: Operation is NOT controlled — proceed freely
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateNotControlledResponse"
        "202":
          description: Operation IS controlled — movement created, pending approval
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateControlledResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ─── Movements ─────────────────────────────────────────────────────────────

  /movements:
    get:
      operationId: approval_movements_list
      summary: List controlled movements
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/MovementStatus"
        - name: requester_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of movements
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMovementsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /movements/{id}:
    get:
      operationId: approval_movements_get
      summary: Get movement details with approval instances and history
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Movement detail
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /movements/{id}/cancel:
    post:
      operationId: approval_movements_cancel
      summary: Cancel a pending movement
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Movement cancelled
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMovementResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /movements/{id}/override:
    post:
      operationId: approval_movements_override
      summary: Override a movement (admin bypass)
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverrideMovementBody"
      responses:
        "200":
          description: Movement overridden
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverrideMovementResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /movements/{id}/retry:
    post:
      operationId: approval_movements_retry
      summary: Retry a failed movement execution
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Movement retried
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryMovementResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /movements/{id}/approve:
    post:
      operationId: approval_movements_approve
      summary: Approve a movement at the current level
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveBody"
      responses:
        "200":
          description: Movement approved (or advanced to next level)
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /movements/{id}/reject:
    post:
      operationId: approval_movements_reject
      summary: Reject a movement
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectBody"
      responses:
        "200":
          description: Movement rejected
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ─── My Approvals ──────────────────────────────────────────────────────────

  /my/approvals:
    get:
      operationId: approval_my_approvals_list
      summary: List approval instances assigned to the authenticated user
      tags: [approval]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ApprovalInstanceStatus"
      responses:
        "200":
          description: List of approvals for the current user
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMyApprovalsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XCorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Correlation ID for distributed tracing

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Idempotency key for write operations

  headers:
    XCorrelationId:
      description: Correlation ID echoed back
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    Forbidden:
      description: Insufficient permissions
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    ValidationError:
      description: Validation error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    # ─── Enums ─────────────────────────────────────────────────────────────

    ControlRuleStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    CriteriaType:
      type: string
      enum: [VALUE, HIERARCHY, ORIGIN, OBJECT]

    OriginType:
      type: string
      enum: [HUMAN, API, MCP, AGENT]

    ApproverType:
      type: string
      enum: [ROLE, USER, SCOPE]

    MovementStatus:
      type: string
      enum:
        - PENDING_APPROVAL
        - APPROVED
        - AUTO_APPROVED
        - REJECTED
        - CANCELLED
        - OVERRIDDEN
        - EXECUTED
        - FAILED

    ApprovalInstanceStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, TIMEOUT, ESCALATED]

    # ─── Problem Details (RFC 9457) ────────────────────────────────────────

    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          description: URI reference identifying the problem type
        title:
          type: string
          description: Short human-readable summary
        status:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: Human-readable explanation
        instance:
          type: string
          description: URI reference for the specific occurrence
        extensions:
          type: object
          properties:
            correlationId:
              type: string
          additionalProperties: true

    # ─── Control Rules ─────────────────────────────────────────────────────

    ControlRuleItem:
      type: object
      required:
        - id
        - tenant_id
        - codigo
        - nome
        - object_type
        - operation_type
        - origin_types
        - criteria_type
        - priority
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        codigo:
          type: string
        nome:
          type: string
        descricao:
          type: string
          nullable: true
        object_type:
          type: string
        operation_type:
          type: string
        origin_types:
          type: array
          items:
            $ref: "#/components/schemas/OriginType"
        criteria_type:
          $ref: "#/components/schemas/CriteriaType"
        value_threshold:
          type: string
          nullable: true
        priority:
          type: integer
        status:
          $ref: "#/components/schemas/ControlRuleStatus"
        valid_from:
          type: string
          format: date-time
          nullable: true
        valid_until:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ListControlRulesResponse:
      type: object
      required: [data, page, page_size, total, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ControlRuleItem"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    CreateControlRuleBody:
      type: object
      required:
        - codigo
        - nome
        - object_type
        - operation_type
        - origin_types
        - criteria_type
      properties:
        codigo:
          type: string
          minLength: 1
          maxLength: 50
        nome:
          type: string
          minLength: 1
          maxLength: 200
        descricao:
          type: string
          maxLength: 2000
        object_type:
          type: string
          minLength: 1
          maxLength: 100
        operation_type:
          type: string
          minLength: 1
          maxLength: 100
        origin_types:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OriginType"
        criteria_type:
          $ref: "#/components/schemas/CriteriaType"
        value_threshold:
          type: string
        priority:
          type: integer
          minimum: 0
          default: 0
        valid_from:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time

    UpdateControlRuleBody:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
          maxLength: 200
        descricao:
          type: string
          maxLength: 2000
          nullable: true
        origin_types:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OriginType"
        criteria_type:
          $ref: "#/components/schemas/CriteriaType"
        value_threshold:
          type: string
          nullable: true
        priority:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/ControlRuleStatus"
        valid_from:
          type: string
          format: date-time
          nullable: true
        valid_until:
          type: string
          format: date-time
          nullable: true

    # ─── Approval Rules ────────────────────────────────────────────────────

    ApprovalRuleItem:
      type: object
      required:
        - id
        - tenant_id
        - control_rule_id
        - level
        - approver_type
        - approver_value
        - allow_self_approve
        - timeout_minutes
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        control_rule_id:
          type: string
          format: uuid
        level:
          type: integer
        approver_type:
          $ref: "#/components/schemas/ApproverType"
        approver_value:
          type: string
        required_scope:
          type: string
          nullable: true
        allow_self_approve:
          type: boolean
        timeout_minutes:
          type: integer
        escalation_rule_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateApprovalRuleBody:
      type: object
      required: [level, approver_type, approver_value]
      properties:
        level:
          type: integer
          minimum: 1
        approver_type:
          $ref: "#/components/schemas/ApproverType"
        approver_value:
          type: string
          minLength: 1
          maxLength: 200
        required_scope:
          type: string
          maxLength: 200
        allow_self_approve:
          type: boolean
          default: false
        timeout_minutes:
          type: integer
          minimum: 1
          default: 1440
        escalation_rule_id:
          type: string
          format: uuid

    UpdateApprovalRuleBody:
      type: object
      properties:
        level:
          type: integer
          minimum: 1
        approver_type:
          $ref: "#/components/schemas/ApproverType"
        approver_value:
          type: string
          minLength: 1
          maxLength: 200
        required_scope:
          type: string
          maxLength: 200
          nullable: true
        allow_self_approve:
          type: boolean
        timeout_minutes:
          type: integer
          minimum: 1
        escalation_rule_id:
          type: string
          format: uuid
          nullable: true

    # ─── Engine ────────────────────────────────────────────────────────────

    EvaluateBody:
      type: object
      required: [object_type, operation_type, origin]
      properties:
        object_type:
          type: string
          minLength: 1
          maxLength: 100
        operation_type:
          type: string
          minLength: 1
          maxLength: 100
        origin:
          $ref: "#/components/schemas/OriginType"
        value:
          type: string
        operation_payload:
          type: object
          additionalProperties: true
        case_id:
          type: string
          format: uuid
        dry_run:
          type: boolean
          default: false

    EvaluateNotControlledResponse:
      type: object
      required: [controlled]
      properties:
        controlled:
          type: boolean
          const: false

    EvaluateControlledResponse:
      type: object
      required: [controlled, movement_id, status, levels]
      properties:
        controlled:
          type: boolean
          const: true
        movement_id:
          type: string
          format: uuid
        status:
          type: string
        levels:
          type: array
          items:
            type: object
            required: [level, approver_type, approver_value, status]
            properties:
              level:
                type: integer
              approver_type:
                type: string
              approver_value:
                type: string
              status:
                type: string

    # ─── Movements ─────────────────────────────────────────────────────────

    MovementListItem:
      type: object
      required:
        - id
        - tenant_id
        - control_rule_id
        - codigo
        - requester_id
        - requester_origin
        - object_type
        - operation_type
        - current_level
        - total_levels
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        control_rule_id:
          type: string
          format: uuid
        codigo:
          type: string
        requester_id:
          type: string
          format: uuid
        requester_origin:
          $ref: "#/components/schemas/OriginType"
        object_type:
          type: string
        object_id:
