# ============================================================================
# Components
# ============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TenantIdPath:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema:
        type: string
        format: uuid
      description: Idempotency key to prevent duplicate mutations (BR-012)
    XCorrelationId:
      name: X-Correlation-ID
      in: header
      schema:
        type: string
        format: uuid

  responses:
    ProblemDetails400:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ProblemDetails401:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ProblemDetails404:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ProblemDetails403:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ProblemDetails409:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ProblemDetails422:
      description: Unprocessable Entity
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ProblemDetails429:
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    ProblemDetails:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        extensions:
          type: object
          properties:
            correlationId: { type: string }

    GenericMessage:
      type: object
      properties:
        message: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 255 }
        password: { type: string, minLength: 1 }
        remember_me: { type: boolean, default: false }
        device_fp: { type: string, maxLength: 500 }

    LoginResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        user:
          type: object
          properties:
            id: { type: string, format: uuid }
            email: { type: string, format: email }
            full_name: { type: string }
            status: { type: string }

    LoginMfaResponse:
      type: object
      properties:
        mfa_required: { type: boolean, enum: [true] }
        temp_token: { type: string }
        expires_in: { type: integer, enum: [300] }

    ProfileResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        codigo: { type: string }
        full_name: { type: string }
        avatar_url: { type: string, nullable: true }
        status: { type: string }
        active_tenant_id: { type: string, format: uuid, nullable: true }
        scopes: { type: array, items: { type: string } }

    UpdateProfileRequest:
      type: object
      properties:
        full_name: { type: string, minLength: 1, maxLength: 255 }
        avatar_url: { type: string, format: uri, nullable: true }

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string, minLength: 1 }
        new_password: { type: string, minLength: 8, maxLength: 128 }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 255 }

    ResetPasswordRequest:
