# @contract INT-008, EX-OAS-001, FR-001..FR-009, SEC-008
#
# OpenAPI 3.1 specification for Integration Protheus (MOD-008).
# 15 endpoints: services CRUD, routine config, mappings, params, engine, logs, reprocess.

openapi: "3.1.0"
info:
  title: EasyA2 API — Integration Protheus (MOD-008)
  version: "1.0.0"
  description: |
    Integration Protheus module: dynamic HTTP integration with Protheus/TOTVS.
    Outbox Pattern + BullMQ for async execution, DLQ with governed reprocessing.
    All errors follow RFC 9457 Problem Details.

servers:
  - url: /api/v1

tags:
  - name: integration-protheus
    description: "Integration Protheus (MOD-008): services, routines, mappings, params, engine, logs"

# ============================================================================
# Paths
# ============================================================================
paths:
  # ---------- Services --------------------------------------------------------
  /admin/integration-services:
    get:
      operationId: admin_integration_services_list
      tags: [integration-protheus]
      summary: List integration services
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, INACTIVE] }
        - name: environment
          in: query
          schema: { type: string, enum: [PROD, HML, DEV] }
      responses:
        "200":
          description: Paginated list of integration services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedServiceList"

    post:
      operationId: admin_integration_services_create
      tags: [integration-protheus]
      summary: Create integration service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceResponse"

  /admin/integration-services/{id}:
    patch:
      operationId: admin_integration_services_update
      tags: [integration-protheus]
      summary: Update integration service
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceResponse"

  # ---------- Routine Configuration -------------------------------------------
  /admin/routines/{id}/integration-config:
    post:
      operationId: admin_integration_routines_configure
      tags: [integration-protheus]
      summary: Configure HTTP extension for integration routine
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureRoutineRequest"
      responses:
        "201":
          description: Routine configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationRoutineResponse"

  # ---------- Field Mappings --------------------------------------------------
  /admin/routines/{id}/field-mappings:
    post:
      operationId: admin_field_mappings_create
      tags: [integration-protheus]
      summary: Create field mapping for integration routine
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFieldMappingRequest"
      responses:
        "201":
          description: Field mapping created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldMappingResponse"

  /admin/field-mappings/{id}:
    patch:
      operationId: admin_field_mappings_update
      tags: [integration-protheus]
      summary: Update field mapping
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFieldMappingRequest"
      responses:
        "200":
          description: Field mapping updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldMappingResponse"

    delete:
      operationId: admin_field_mappings_delete
      tags: [integration-protheus]
      summary: Delete field mapping
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Field mapping deleted

  # ---------- Params ----------------------------------------------------------
  /admin/routines/{id}/params:
    post:
      operationId: admin_integration_params_create
      tags: [integration-protheus]
      summary: Create integration parameter
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParamRequest"
      responses:
        "201":
          description: Parameter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParamResponse"

  /admin/integration-params/{id}:
    patch:
      operationId: admin_integration_params_update
      tags: [integration-protheus]
      summary: Update integration parameter
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParamRequest"
      responses:
        "200":
          description: Parameter updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParamResponse"

  # ---------- Engine ----------------------------------------------------------
  /integration-engine/execute:
    post:
      operationId: integration_engine_execute
      tags: [integration-protheus]
      summary: Execute integration (queue a call)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteIntegrationRequest"
      responses:
        "202":
          description: Integration call queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteIntegrationResponse"

  # ---------- Logs ------------------------------------------------------------
  /admin/integration-logs:
    get:
      operationId: admin_integration_logs_list
      tags: [integration-protheus]
      summary: List integration call logs
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: routine_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [QUEUED, RUNNING, SUCCESS, FAILED, DLQ, REPROCESSED] }
        - name: service_id
          in: query
          schema: { type: string, format: uuid }
        - name: correlation_id
          in: query
          schema: { type: string }
        - name: period_start
          in: query
          schema: { type: string, format: date-time }
        - name: period_end
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Paginated list of call logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCallLogList"

  /admin/integration-logs/{id}:
    get:
      operationId: admin_integration_logs_get
      tags: [integration-protheus]
      summary: Get integration call log detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Call log detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLogDetailResponse"

  /admin/integration-logs/{id}/reprocess:
    post:
      operationId: admin_integration_logs_reprocess
      tags: [integration-protheus]
      summary: Reprocess a DLQ call log
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReprocessRequest"
      responses:
        "202":
          description: Reprocess queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReprocessResponse"

# ============================================================================
# Components
# ============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    # --- Services ---
    CreateServiceRequest:
      type: object
      required: [codigo, nome, base_url, auth_type, environment]
      properties:
        codigo: { type: string, minLength: 1, maxLength: 50 }
        nome: { type: string, minLength: 1, maxLength: 200 }
        base_url: { type: string, format: uri, maxLength: 500 }
        auth_type: { type: string, enum: [NONE, BASIC, BEARER, OAUTH2] }
        auth_config: { type: object, nullable: true }
        timeout_ms: { type: integer, minimum: 1, maximum: 120000, default: 30000 }
        environment: { type: string, enum: [PROD, HML, DEV] }

    UpdateServiceRequest:
      type: object
      properties:
        nome: { type: string, minLength: 1, maxLength: 200 }
        base_url: { type: string, format: uri, maxLength: 500 }
        auth_type: { type: string, enum: [NONE, BASIC, BEARER, OAUTH2] }
        auth_config: { type: object, nullable: true }
        timeout_ms: { type: integer, minimum: 1, maximum: 120000 }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
        environment: { type: string, enum: [PROD, HML, DEV] }

    ServiceResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        codigo: { type: string }
        nome: { type: string }
        base_url: { type: string }
        auth_type: { type: string, enum: [NONE, BASIC, BEARER, OAUTH2] }
        auth_config: { type: string, description: "Always '***' (BR-002)" }
        timeout_ms: { type: integer }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
        environment: { type: string, enum: [PROD, HML, DEV] }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ServiceListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        codigo: { type: string }
        nome: { type: string }
        base_url: { type: string }
        auth_type: { type: string }
        timeout_ms: { type: integer }
        status: { type: string }
        environment: { type: string }
        created_at: { type: string, format: date-time }

    PaginatedServiceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ServiceListItem"
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    # --- Routine Configuration ---
    ConfigureRoutineRequest:
      type: object
      required: [service_id, http_method, endpoint_tpl]
      properties:
        service_id: { type: string, format: uuid }
        http_method: { type: string, enum: [GET, POST, PUT, PATCH, DELETE] }
        endpoint_tpl: { type: string, minLength: 1, maxLength: 500 }
        content_type: { type: string, maxLength: 100 }
        timeout_ms: { type: integer, minimum: 1, maximum: 120000 }
        retry_max: { type: integer, minimum: 0, maximum: 10, default: 3 }
        retry_backoff_ms: { type: integer, minimum: 100, maximum: 60000, default: 1000 }
        trigger_events: { type: array, items: { type: string } }

    IntegrationRoutineResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        routine_id: { type: string, format: uuid }
        service_id: { type: string, format: uuid }
        http_method: { type: string }
        endpoint_tpl: { type: string }
        retry_max: { type: integer }
        retry_backoff_ms: { type: integer }

    # --- Field Mappings ---
    CreateFieldMappingRequest:
      type: object
      required: [source_field, target_field, mapping_type, ordem]
      properties:
        source_field: { type: string, minLength: 1, maxLength: 200 }
        target_field: { type: string, minLength: 1, maxLength: 200 }
        mapping_type: { type: string, enum: [FIELD, PARAM, HEADER, FIXED_VALUE, DERIVED] }
        required: { type: boolean, default: false }
        transform_expr: { type: string, maxLength: 500, nullable: true }
        condition_expr: { type: string, maxLength: 500, nullable: true }
        default_value: { type: string, maxLength: 500, nullable: true }
        ordem: { type: integer, minimum: 1 }

    UpdateFieldMappingRequest:
      type: object
      properties:
        source_field: { type: string, minLength: 1, maxLength: 200 }
        target_field: { type: string, minLength: 1, maxLength: 200 }
        mapping_type: { type: string, enum: [FIELD, PARAM, HEADER, FIXED_VALUE, DERIVED] }
        required: { type: boolean }
        transform_expr: { type: string, maxLength: 500, nullable: true }
        condition_expr: { type: string, maxLength: 500, nullable: true }
        default_value: { type: string, maxLength: 500, nullable: true }
        ordem: { type: integer, minimum: 1 }

    FieldMappingResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        routine_id: { type: string, format: uuid }
        source_field: { type: string }
        target_field: { type: string }
        mapping_type: { type: string }
        required: { type: boolean }
        transform_expr: { type: string, nullable: true }
        condition_expr: { type: string, nullable: true }
        default_value: { type: string, nullable: true }
        ordem: { type: integer }

    # --- Params ---
    CreateParamRequest:
      type: object
      required: [param_key, param_type]
      properties:
        param_key: { type: string, minLength: 1, maxLength: 100 }
        param_type: { type: string, enum: [FIXED, DERIVED_FROM_TENANT, DERIVED_FROM_CONTEXT, HEADER] }
        value: { type: string, maxLength: 500, nullable: true }
        derivation_expr: { type: string, maxLength: 500, nullable: true }
        is_sensitive: { type: boolean, default: false }

    UpdateParamRequest:
      type: object
      properties:
        param_key: { type: string, minLength: 1, maxLength: 100 }
        param_type: { type: string, enum: [FIXED, DERIVED_FROM_TENANT, DERIVED_FROM_CONTEXT, HEADER] }
        value: { type: string, maxLength: 500, nullable: true }
        derivation_expr: { type: string, maxLength: 500, nullable: true }
        is_sensitive: { type: boolean }

    ParamResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        routine_id: { type: string, format: uuid }
        param_key: { type: string }
        param_type: { type: string }
        value: { type: string, nullable: true, description: "'***' if is_sensitive (BR-005)" }
        derivation_expr: { type: string, nullable: true }
        is_sensitive: { type: boolean }

    # --- Engine ---
    ExecuteIntegrationRequest:
      type: object
      required: [routine_id]
      properties:
        routine_id: { type: string, format: uuid }
        case_id: { type: string, format: uuid }
        context: { type: object }

    ExecuteIntegrationResponse:
      type: object
      properties:
        call_log_id: { type: string, format: uuid }
        status: { type: string, enum: [QUEUED] }
        correlation_id: { type: string }

    # --- Logs ---
    CallLogListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        routine_id: { type: string, format: uuid }
        case_id: { type: string, format: uuid, nullable: true }
        correlation_id: { type: string }
        status: { type: string, enum: [QUEUED, RUNNING, SUCCESS, FAILED, DLQ, REPROCESSED] }
        attempt_number: { type: integer }
        parent_log_id: { type: string, format: uuid, nullable: true }
        response_status: { type: integer, nullable: true }
        error_message: { type: string, nullable: true }
        duration_ms: { type: integer, nullable: true }
        queued_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    PaginatedCallLogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CallLogListItem"
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    CallLogDetailResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        routine_id: { type: string, format: uuid }
        case_id: { type: string, format: uuid, nullable: true }
        correlation_id: { type: string }
        status: { type: string }
        attempt_number: { type: integer }
        parent_log_id: { type: string, format: uuid, nullable: true }
        request_payload: { type: object, nullable: true }
        request_headers: { type: object, nullable: true }
        response_status: { type: integer, nullable: true }
        response_body: { type: object, nullable: true }
        error_message: { type: string, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        duration_ms: { type: integer, nullable: true }
        queued_at: { type: string, format: date-time }
        reprocess_reason: { type: string, nullable: true }
        reprocessed_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    # --- Reprocess ---
    ReprocessRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 10, maxLength: 2000 }

    ReprocessResponse:
      type: object
      properties:
        new_call_log_id: { type: string, format: uuid }
        reprocess_request_id: { type: string, format: uuid }
        status: { type: string, enum: [QUEUED] }

    # --- Metrics ---
    MetricsResponse:
      type: object
      properties:
        total: { type: integer }
        success: { type: integer }
        failed: { type: integer }
        dlq: { type: integer }
        running: { type: integer }
        queued: { type: integer }
        success_rate: { type: number }
