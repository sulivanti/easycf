manifest_version: 1
screen_id: "UX-USER-002"
name: "Detalhe e Edição de Usuário"
entity_type: "user"

routes:
  - path: "/users/{id}"
    method: GET
  - path: "/users/{id}"
    method: PATCH
  - path: "/users/{id}/activate"
    method: POST
  - path: "/users/{id}/deactivate"
    method: POST
  - path: "/domain-events"
    method: GET

telemetry_defaults:
  event_name: "user.detail_viewed"
  required_fields:
    - "screen_id"
    - "tenant_id"
    - "correlation_id"
  propagate_headers:
    - "X-Correlation-ID"

permissions:
  read: "users:read"
  write: "users:write"

actions:
  - action: "view"
    client_only: false
    operation_ids:
      - "users_get"
    permissions:
      - "users:read"
    error_mapping:
      http_status: [401, 403, 404, 500]

  - action: "update"
    client_only: false
    operation_ids:
      - "users_update"
    permissions:
      - "users:write"
    error_mapping:
      http_status: [401, 403, 404, 409, 422, 500]

  - action: "activate"
    client_only: false
    operation_ids:
      - "users_activate"
    permissions:
      - "users:write"
    ui_rules:
      action_enablement:
        - enabled_when:
            all:
              - field: "status"
                op: "=="
                value: "INACTIVE"
    error_mapping:
      http_status: [401, 403, 409, 422, 500]

  - action: "deactivate"
    client_only: false
    operation_ids:
      - "users_deactivate"
    permissions:
      - "users:write"
    ui_rules:
      action_enablement:
        - enabled_when:
            all:
              - field: "status"
                op: "=="
                value: "ACTIVE"
    error_mapping:
      http_status: [401, 403, 409, 422, 500]

  - action: "view_history"
    client_only: false
    operation_ids:
      - "domain_events_list_by_entity"
    permissions:
      - "users:read"
    error_mapping:
      http_status: [401, 403, 500]

ui_rules:
  action_visibility:
    strategy: "hide_if_no_permission"
  action_enablement: []

error_mapping:
  default_user_message: "Ocorreu um erro inesperado. Tente novamente ou contate o suporte."
  http_status:
    "401":
      user_message: "Sessão expirada. Faça login novamente."
      ui:
        type: "modal"
        level: "error"
    "403":
      user_message: "Você não tem permissão para executar esta ação."
      ui:
        type: "toast"
        level: "error"
    "404":
      user_message: "Usuário não encontrado."
      ui:
        type: "inline"
        level: "error"
    "409":
      user_message: "Conflito detectado. O registro pode ter sido alterado por outro usuário."
      ui:
        type: "toast"
        level: "warning"
    "422":
      user_message: "Dados inválidos. Verifique os campos e tente novamente."
      ui:
        type: "form_validation"
        level: "error"
    "500":
      user_message: "Erro interno do servidor. Contate o suporte."
      ui:
        type: "toast"
        level: "error"
