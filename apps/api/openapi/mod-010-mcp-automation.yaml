openapi: 3.1.0
info:
  title: ECF — MCP Automation Module (MOD-010)
  version: 1.0.0
  description: |
    MCP Automation module API — governed agent management, action catalog,
    gateway execution engine, and execution audit log.
    All errors follow RFC 9457 Problem Details.
  contact:
    name: ECF Team

servers:
  - url: /api/v1
    description: API v1

security:
  - bearerAuth: []

tags:
  - name: mcp-admin
    description: MCP agent, action, and execution administration
  - name: mcp-gateway
    description: MCP gateway execution endpoint (API key auth)

paths:
  # ─── MCP Agents ─────────────────────────────────────────────────────────

  /admin/mcp-agents:
    get:
      operationId: mcp_agents_list
      summary: List MCP agents
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AgentStatus"
        - name: owner_user_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of MCP agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAgents"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        required: [mcp:agent:read]

    post:
      operationId: mcp_agents_create
      summary: Create MCP agent
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created — API key returned ONCE (BR-004)
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      x-permissions:
        required: [mcp:agent:write]

  /admin/mcp-agents/{id}:
    patch:
      operationId: mcp_agents_update
      summary: Update MCP agent
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Agent updated
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      x-permissions:
        required: [mcp:agent:write]

  /admin/mcp-agents/{id}/revoke:
    post:
      operationId: mcp_agents_revoke
      summary: Revoke MCP agent (irreversible)
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAgentRequest"
      responses:
        "200":
          description: Agent revoked
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      x-permissions:
        required: [mcp:agent:revoke]

  /admin/mcp-agents/{id}/rotate-key:
    post:
      operationId: mcp_agents_rotate_key
      summary: Rotate MCP agent API key
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "200":
          description: Key rotated — new API key returned ONCE (BR-004)
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      x-permissions:
        required: [mcp:agent:write]

  /admin/mcp-agents/{id}/enable-phase2:
    post:
      operationId: mcp_agents_enable_phase2
      summary: Enable Phase 2 create capability for agent
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnablePhase2Request"
      responses:
        "200":
          description: Phase 2 enabled
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnablePhase2Response"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      x-permissions:
        required: [mcp:agent:write]

  /admin/mcp-agents/{id}/actions:
    post:
      operationId: mcp_agents_grant_action
      summary: Grant agent-action link
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantAgentActionRequest"
      responses:
        "201":
          description: Agent-action link created
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentActionLink"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        required: [mcp:agent:write]

  /admin/mcp-agents/{id}/actions/{actionId}:
    delete:
      operationId: mcp_agents_revoke_action
      summary: Revoke agent-action link
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: actionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "204":
          description: Link removed (idempotent)
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
        "401":
          $ref: "#/components/responses/Unauthorized"
      x-permissions:
        required: [mcp:agent:write]

  # ─── MCP Actions ────────────────────────────────────────────────────────

  /admin/mcp-actions:
    get:
      operationId: mcp_actions_list
      summary: List MCP action catalog
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: action_type_id
          in: query
          schema:
            type: string
            format: uuid
        - name: execution_policy
          in: query
          schema:
            $ref: "#/components/schemas/ExecutionPolicy"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ActionStatus"
      responses:
        "200":
          description: Paginated list of MCP actions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedActions"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        required: [mcp:action:read]

    post:
      operationId: mcp_actions_create
      summary: Create MCP action
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActionRequest"
      responses:
        "201":
          description: Action created
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      x-permissions:
        required: [mcp:action:write]

  /admin/mcp-actions/{id}:
    patch:
      operationId: mcp_actions_update
      summary: Update MCP action
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionRequest"
      responses:
        "200":
          description: Action updated
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      x-permissions:
        required: [mcp:action:write]

  # ─── MCP Executions ─────────────────────────────────────────────────────

  /admin/mcp-executions:
    get:
      operationId: mcp_executions_list
      summary: List MCP execution log
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: agent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: action_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ExecutionStatus"
        - name: policy_applied
          in: query
          schema:
            $ref: "#/components/schemas/ExecutionPolicy"
        - name: received_at_from
          in: query
          schema:
            type: string
            format: date-time
        - name: received_at_to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated execution log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExecutions"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        required: [mcp:log:read]

  /admin/mcp-executions/{id}:
    get:
      operationId: mcp_executions_get
      summary: Get MCP execution detail
      tags: [mcp-admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Execution detail with sanitized payloads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        required: [mcp:log:read]

  # ─── MCP Gateway ────────────────────────────────────────────────────────

  /mcp/execute:
    post:
      operationId: mcp_execute
      summary: Execute MCP action via gateway
      description: |
        Entry point for all MCP agent operations.
        Authentication via X-MCP-Agent-Key header (not JWT).
        Implements the 8-step gateway algorithm (BR-010).
      tags: [mcp-gateway]
      security: []
      parameters:
        - name: X-MCP-Agent-Key
          in: header
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XCorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteMcpRequest"
      responses:
        "200":
          description: DIRECT or EVENT_ONLY execution completed
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteMcpResponse"
        "202":
          description: CONTROLLED execution — movement created, pending approval
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteMcpResponse"
        "401":
          description: Invalid or missing API key
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Agent revoked, inactive, or missing scopes
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Action not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

# ─── Components ─────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XCorrelationId:
      name: X-Correlation-ID
      in: header
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema:
        type: string
        maxLength: 128
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  headers:
    XCorrelationId:
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    ProblemDetails:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        extensions:
          type: object
          properties:
            correlationId: { type: string }

    # ── Enums ────────────────────────────────────────────────────────────

    AgentStatus:
      type: string
      enum: [ACTIVE, INACTIVE, REVOKED]

    ExecutionPolicy:
      type: string
      enum: [DIRECT, CONTROLLED, EVENT_ONLY]

    ActionStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    ExecutionStatus:
      type: string
      enum:
        - RECEIVED
        - DISPATCHED
        - DIRECT_SUCCESS
        - DIRECT_FAILED
        - CONTROLLED_PENDING
        - CONTROLLED_APPROVED
        - CONTROLLED_REJECTED
        - EVENT_EMITTED
        - BLOCKED

    # ── Agent ────────────────────────────────────────────────────────────

    AgentItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        codigo: { type: string }
        nome: { type: string }
        owner_user_id: { type: string, format: uuid }
        allowed_scopes:
          type: array
          items: { type: string }
        status: { $ref: "#/components/schemas/AgentStatus" }
        phase2_create_enabled: { type: boolean }
        last_used_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }

    PaginatedAgents:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AgentItem" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    CreateAgentRequest:
      type: object
      required: [codigo, nome, owner_user_id, allowed_scopes]
      properties:
        codigo: { type: string, minLength: 1, maxLength: 50 }
        nome: { type: string, minLength: 1, maxLength: 200 }
        owner_user_id: { type: string, format: uuid }
        allowed_scopes:
          type: array
          minItems: 1
          items: { type: string, maxLength: 100, pattern: "^[a-z][a-z0-9_]*(:[a-z][a-z0-9_]*){1,2}$" }

    CreateAgentResponse:
      type: object
      properties:
        agent: { $ref: "#/components/schemas/AgentItem" }
        api_key:
          type: string
          description: Plaintext API key — returned ONCE (BR-004). Store securely.

    UpdateAgentRequest:
      type: object
      properties:
        nome: { type: string, minLength: 1, maxLength: 200 }
        allowed_scopes:
          type: array
          minItems: 1
          items: { type: string, maxLength: 100 }
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    RevokeAgentRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 2000 }

    EnablePhase2Request:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 10, maxLength: 2000 }

    EnablePhase2Response:
      type: object
      properties:
        agent_id: { type: string, format: uuid }
        phase2_create_enabled: { type: boolean, const: true }
        enabled_by: { type: string, format: uuid }
        enabled_at: { type: string, format: date-time }
        reason: { type: string }

    # ── Agent-Action Link ────────────────────────────────────────────────

    GrantAgentActionRequest:
      type: object
      required: [action_id]
      properties:
        action_id: { type: string, format: uuid }
        valid_until: { type: string, format: date-time }

    AgentActionLink:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        action_id: { type: string, format: uuid }
        granted_by: { type: string, format: uuid }
        granted_at: { type: string, format: date-time }
        valid_until: { type: string, format: date-time, nullable: true }

    # ── Action ───────────────────────────────────────────────────────────

    ActionItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        codigo: { type: string }
        nome: { type: string }
        action_type_id: { type: string, format: uuid }
        execution_policy: { $ref: "#/components/schemas/ExecutionPolicy" }
        target_object_type: { type: string }
        required_scopes:
          type: array
          items: { type: string }
        linked_routine_id: { type: string, format: uuid, nullable: true }
        linked_integration_id: { type: string, format: uuid, nullable: true }
        description: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/ActionStatus" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PaginatedActions:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/ActionItem" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    CreateActionRequest:
      type: object
      required: [codigo, nome, action_type_id, execution_policy, target_object_type, required_scopes]
      properties:
        codigo: { type: string, minLength: 1, maxLength: 50 }
        nome: { type: string, minLength: 1, maxLength: 200 }
        action_type_id: { type: string, format: uuid }
        execution_policy: { $ref: "#/components/schemas/ExecutionPolicy" }
        target_object_type: { type: string, minLength: 1, maxLength: 100 }
        required_scopes:
          type: array
          minItems: 1
          items: { type: string, maxLength: 100 }
        linked_routine_id: { type: string, format: uuid }
        linked_integration_id: { type: string, format: uuid }
        description: { type: string, maxLength: 2000 }

    UpdateActionRequest:
      type: object
      properties:
        nome: { type: string, minLength: 1, maxLength: 200 }
        execution_policy: { $ref: "#/components/schemas/ExecutionPolicy" }
        required_scopes:
          type: array
          minItems: 1
          items: { type: string, maxLength: 100 }
        linked_routine_id: { type: string, format: uuid, nullable: true }
        linked_integration_id: { type: string, format: uuid, nullable: true }
        description: { type: string, maxLength: 2000, nullable: true }
        status: { $ref: "#/components/schemas/ActionStatus" }

    # ── Execution ────────────────────────────────────────────────────────

    ExecutionListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        action_id: { type: string, format: uuid }
        policy_applied: { $ref: "#/components/schemas/ExecutionPolicy" }
        correlation_id: { type: string }
        status: { $ref: "#/components/schemas/ExecutionStatus" }
        blocked_reason: { type: string, nullable: true }
        linked_movement_id: { type: string, format: uuid, nullable: true }
        duration_ms: { type: integer, nullable: true }
        received_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    PaginatedExecutions:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/ExecutionListItem" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    ExecutionDetail:
      allOf:
        - $ref: "#/components/schemas/ExecutionListItem"
        - type: object
          properties:
            origin_ip: { type: string, nullable: true }
            request_payload:
              type: object
              description: Sanitized — sensitive fields masked
            linked_integration_log_id: { type: string, format: uuid, nullable: true }
            result_payload:
              type: object
              nullable: true
              description: Sanitized — sensitive fields masked
            error_message: { type: string, nullable: true }

    # ── Gateway ──────────────────────────────────────────────────────────

    ExecuteMcpRequest:
      type: object
      required: [action_code]
      properties:
        action_code: { type: string, minLength: 1, maxLength: 100 }
        payload:
          type: object
          default: {}

    ExecuteMcpResponse:
      type: object
      properties:
        execution_id: { type: string, format: uuid }
        status: { type: string }
        policy_applied: { type: string }
        movement_id: { type: string, format: uuid }
        result_payload: { type: object }
