# ============================================================
# Screen Manifest — UX-IDN-002
# Tela: Painel de Compartilhamentos e Delegações
# Módulo: MOD-004 | Schema: v1 | Data: 2026-03-15
# ============================================================

schema_version: "v1"
screen_id: "UX-IDN-002"
name: "Painel de Compartilhamentos e Delegações"
type: list
module: "MOD-004"
route: "/organizacao/identidade/compartilhamentos"
auth_required: true
pre_auth: false
layout: shell

linked_stories:
  - "US-MOD-004"
  - "US-MOD-004-F04"

telemetry_defaults:
  package: "@easycf/ui-telemetry"
  include_tenant_id: true
  propagate_correlation_id: true
  capture_duration_ms: true

panels:
  - id: "shares"
    label: "Meus Compartilhamentos"
    default: true
    actions_scope: [load_shares, create_share, revoke_share, search_users]

  - id: "delegations"
    label: "Minhas Delegações"
    default: false
    actions_scope: [load_delegations, create_delegation, revoke_delegation, search_users]

  - id: "received"
    label: "Acessos Recebidos"
    default: false
    actions_scope: [load_my_shared_accesses, load_my_delegations_received]

actions:

  - id: load_shares
    label: "Carregar compartilhamentos ativos (admin)"
    type: view
    operation_id: admin_access_shares_list
    http_method: GET
    endpoint: "/api/v1/admin/access-shares"
    requires_scope: ["identity:share:read"]
    loading_state: skeleton
    error_handling:
      strategy: toast
      include_correlation_id: true
      user_message: "Não foi possível carregar os compartilhamentos."

  - id: create_share
    label: "Criar compartilhamento controlado"
    type: submit
    operation_id: admin_access_shares_create
    http_method: POST
    endpoint: "/api/v1/admin/access-shares"
    requires_scope: ["identity:share:write"]
    loading_state: button
    error_handling:
      strategy: inline
      include_correlation_id: true
      user_message: "Não foi possível criar o compartilhamento."

  - id: revoke_share
    label: "Revogar compartilhamento"
    type: submit
    operation_id: admin_access_shares_revoke
    http_method: DELETE
    endpoint: "/api/v1/admin/access-shares/:id"
    requires_scope: ["identity:share:revoke"]
    loading_state: button
    error_handling:
      strategy: toast
      include_correlation_id: true
      user_message: "Não foi possível revogar o compartilhamento."

  - id: load_delegations
    label: "Carregar delegações ativas (admin)"
    type: view
    operation_id: access_delegations_list
    http_method: GET
    endpoint: "/api/v1/access-delegations"
    requires_scope: []
    loading_state: skeleton
    error_handling:
      strategy: toast
      include_correlation_id: true
      user_message: "Não foi possível carregar as delegações."

  - id: create_delegation
    label: "Criar delegação temporária"
    type: submit
    operation_id: access_delegations_create
    http_method: POST
    endpoint: "/api/v1/access-delegations"
    requires_scope: []
    loading_state: button
    error_handling:
      strategy: inline
      include_correlation_id: true
      user_message: "Não foi possível criar a delegação."

  - id: revoke_delegation
    label: "Revogar delegação própria"
    type: submit
    operation_id: access_delegations_revoke
    http_method: DELETE
    endpoint: "/api/v1/access-delegations/:id"
    requires_scope: []
    loading_state: button
    error_handling:
      strategy: toast
      include_correlation_id: true
      user_message: "Não foi possível revogar a delegação."

  - id: load_my_shared_accesses
    label: "Carregar acessos compartilhados comigo"
    type: view
    operation_id: my_shared_accesses
    http_method: GET
    endpoint: "/api/v1/my/shared-accesses"
    requires_scope: []
    loading_state: skeleton
    error_handling:
      strategy: toast
      include_correlation_id: true
      user_message: "Não foi possível carregar seus acessos recebidos."

  - id: load_my_delegations_received
    label: "Carregar delegações recebidas"
    type: view
    operation_id: access_delegations_list
    http_method: GET
    endpoint: "/api/v1/access-delegations?direction=received"
    requires_scope: []
    loading_state: skeleton
    error_handling:
      strategy: toast
      include_correlation_id: true
      user_message: "Não foi possível carregar as delegações recebidas."

  - id: search_users
    label: "Buscar usuarios para autocomplete nos drawers"
    type: view
    operation_id: users_list
    http_method: GET
    endpoint: "/api/v1/users"
    requires_scope: []
    loading_state: none
    query_params: ["q"]
    error_handling:
      strategy: silent
      include_correlation_id: false
      user_message: ""

  - id: switch_panel
    label: "Alternar entre painéis"
    type: client_only
    client_only: true
    loading_state: none

components:

  - id: "tab-bar"
    name: "TabBar"
    description: |
      Componente reutilizável shared/ui: barra de abas com underline.
      Ativa: border-bottom 2px #2E86C1, text 13px 700 #2E86C1.
      Inativa: border-bottom 2px transparent, text 13px 500 #888.
      Navegação por teclado: Arrow keys + Enter/Space. role=tablist.
      Tab "Meus Compartilhamentos" oculta sem scope identity:share:read.
    actions_used: [switch_panel]

  - id: "shares-table"
    name: "SharesTable"
    description: |
      Tabela de compartilhamentos (tab Meus Compartilhamentos):
      Colunas: COMPARTILHADO COM (Avatar 28x28 + Nome), ESCOPO/RECURSO, TIPO, VALIDADE, STATUS, AÇÕES
      Grantee exibido com avatar+nome (não UUID). Respostas expandidas via FR-001-M01.
      Badge expiração: âmbar (<=7d), vermelho ("Expira amanhã"), cinza+strikethrough (EXPIRED).
      Ação: ícone x-circle para revogar (hover #E74C3C).
      Empty: ícone share 80x80 + "Nenhum compartilhamento ativo." + BtnCriar.
      Cursor pagination: "Carregar mais".
    actions_used: [load_shares, revoke_share]

  - id: "create-share-drawer"
    name: "CreateShareDrawer"
    description: |
      Drawer 480px slide-in com overlay para novo compartilhamento:
        - CampoGrantee: Autocomplete filtrando usuarios ativos do tenant (GET /users?q=)
        - CampoRecurso: Select resource_type
        - CampoRecursoId: Autocomplete filtrando por resource_type
        - CampoAcoes: MultiSelect allowed_actions
        - CampoMotivo: Textarea (w:100%, h:80, r:8, resize vertical, obrigatório)
        - CampoAutorizador: Autocomplete + badges condicionais ao scope identity:share:authorize
        - CampoValidade: DatePicker (datas passadas bloqueadas)
        - Footer: Cancelar + Criar (disabled se auto-auth sem scope)
    actions_used: [create_share, search_users]

  - id: "delegations-given-section"
    name: "DelegationsGivenSection"
    description: |
      Seção "Delegações Dadas" (tab Minhas Delegações):
      SectionTitle 16px 700 #111. Colunas: DELEGADO (Avatar+Nome), ESCOPOS (pills), PERÍODO, MOTIVO, AÇÕES.
      Ação: revogar (x-circle) apenas para delegações onde caller=delegator.
      Empty: "Nenhuma delegação ativa." + BtnCriar.
    actions_used: [load_delegations, revoke_delegation]

  - id: "delegations-received-section"
    name: "DelegationsReceivedSection"
    description: |
      Seção "Delegações Recebidas" (tab Minhas Delegações):
      SectionTitle 16px 700 #111. Banner re-delegação ANTES da tabela (role=alert).
      Mesma estrutura de tabela, sem coluna AÇÕES.
    actions_used: [load_delegations]

  - id: "create-delegation-drawer"
    name: "CreateDelegationDrawer"
    description: |
      Drawer 480px slide-in para nova delegação:
        - Banner re-delegação proibida (role=alert, bg #E3F2FD, ANTES dos campos)
        - CampoDelegatee: Autocomplete usuarios ativos (GET /users?q=)
        - CampoEscopos: MultiSelect com :approve/:execute/:sign DESABILITADOS + tooltip + aria-disabled
        - CampoPeriodo: DateRangePicker (flex gap:8px) Início + Fim
        - CampoMotivo: Textarea (h:80, obrigatório)
        - Footer: Cancelar + "Criar Delegação"
    actions_used: [create_delegation, search_users]

  - id: "received-shares-section"
    name: "ReceivedSharesSection"
    description: |
      Seção "Compartilhamentos Recebidos" (tab Acessos Recebidos):
      Banner "Estes acessos são temporários e expiram automaticamente." (role=alert).
      SectionTitle 16px 700 #111.
      Colunas: CONCEDENTE (Avatar+Nome), ESCOPO/RECURSO, AÇÕES PERMITIDAS, VÁLIDO ATÉ.
      Sem ações (somente leitura).
    actions_used: [load_my_shared_accesses]

  - id: "received-delegations-section"
    name: "ReceivedDelegationsSection"
    description: |
      Seção "Delegações Recebidas" (tab Acessos Recebidos):
      Banner re-delegação proibida. SectionTitle 16px 700 #111.
      Mesma estrutura de tabela de delegações recebidas.
      Sem ações (somente leitura).
    actions_used: [load_my_delegations_received]

  - id: "banner"
    name: "Banner"
    description: |
      Componente reutilizável shared/ui:
      Variante INFO: bg #E3F2FD, border #B8D9F2, text #2E86C1. role=alert.
      Variante WARNING: bg #FFF3E0, border #FFE0B2, text #E67E22.
    actions_used: []

  - id: "revoke-modal"
    name: "RevokeModal"
    description: |
      Modal 420px com ícone warning circular (48x48 bg #FFF3E0):
      Variantes: "Revogar compartilhamento?" / "Revogar delegação?"
      Botões: Cancelar (foco padrão) + Revogar (fill #E74C3C).
    actions_used: [revoke_share, revoke_delegation]

navigation:
  guard: auth
  redirect_if_unauth: "/login"

notes: |
  REGRAS:
  1. Painel "Compartilhamentos" (admin): visível apenas com identity:share:read.
     Painel "Delegações" e "Recebidos": acessíveis por qualquer usuário autenticado.
  2. Botão "Revogar share": visível apenas com identity:share:revoke.
  3. Auto-autorização condicional ao scope identity:share:authorize — com scope, permite (badge info); sem scope, bloqueia (aviso inline + botão disabled).
  4. Escopos de aprovação no drawer de delegação: exibidos como desabilitados (não ocultos)
     para transparência — o usuário entende por que não pode delegá-los.
  5. Recursos com status EXPIRED: exibidos em cinza com badge "Expirado".
     Não são removidos da listagem por 30 dias (histórico).

changelog:
  - version: "1.2.0"
    date: "2026-03-31"
    author: "cascade-amendment"
    description: "Alinhamento UX-001-M01: rota /organizacao/identidade/compartilhamentos, TabBar underline, tabs renomeadas (Meus Compartilhamentos, Minhas Delegações, Acessos Recebidos), colunas reestruturadas, Avatar+Nome em vez de UUID (FR-001-M01), seções dadas/recebidas separadas, Banner e RevokeModal como componentes, autocomplete usuarios."
  - version: "1.1.0"
    date: "2026-03-17"
    author: "Marcos Sulivan"
    description: "Alinha CreateShareDrawer com épico v1.1.0: auto-autorização condicional ao scope identity:share:authorize (M-W1 validate-all)."
  - version: "1.0.0"
    date: "2026-03-15"
    author: "arquitetura"
    description: "Criação inicial. Painéis shares/delegations/received, drawers de criação com validações inline."
