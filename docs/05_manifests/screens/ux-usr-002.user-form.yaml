# ============================================================
# Screen Manifest — UX-USR-002
# Tela: Formulário de Cadastro de Usuário (MOD-002)
# Schema: v1 | Versão: 1.0.0 | Data: 2026-03-15
# ============================================================
# Dois modos: "Enviar Convite" (padrão) e "Senha Temporária".
# Idempotency-Key (UUID v4) gerado no mount do formulário.
# LGPD: e-mail NUNCA em toasts de sucesso.
# Erros 422: inline por campo. Erros 409: inline no campo e-mail.
# ============================================================

manifest_version: 1
screen_id: UX-USR-002
name: Formulário de Cadastro de Usuário
entity_type: user

linked_stories:
  - US-MOD-002
  - US-MOD-002-F02

routes:
  - path: /api/v1/users
    method: POST
  - path: /api/v1/roles
    method: GET

telemetry_defaults:
  event_name: user.create_form_viewed
  required_fields:
    - screen_id
    - tenant_id
    - correlation_id
  propagate_headers:
    - X-Correlation-ID

permissions:
  write: users:write

actions:
  - action: view
    client_only: false
    operation_ids:
      - roles_list
    permission: users:write
    # Carrega perfis disponíveis para o select

  - action: create
    client_only: false
    operation_ids:
      - users_create
    permission: users:write
    # POST /api/v1/users com Idempotency-Key
    # Modo convite: { mode: "invite" }
    # Modo senha: { password, forcePasswordReset: true }

  - action: cancel
    client_only: true
    operation_ids: []
    permission: users:write
    # Descarta formulário e redireciona para /usuarios

ui_rules:
  action_visibility:
    strategy: hide_if_no_permission
  action_enablement: []

error_mapping:
  default_user_message: Não foi possível criar o usuário.
  http_status:
    '401':
      user_message: Sessão expirada. Faça login novamente.
      ui:
        type: modal
        level: error
    '403':
      user_message: Sem permissão para criar usuários.
      ui:
        type: toast
        level: error
    '409':
      user_message: Este e-mail já está cadastrado no sistema.
      ui:
        type: inline
        level: error
    '422':
      user_message: Dados inválidos. Verifique os campos e tente novamente.
      ui:
        type: form_validation
        level: error
      invalid_fields_path: extensions.invalid_fields
    '500':
      user_message: Erro interno do servidor. Contate o suporte.
      ui:
        type: toast
        level: error
