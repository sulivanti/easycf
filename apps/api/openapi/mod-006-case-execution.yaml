# @contract INT-006, EX-OAS-001, FR-001..FR-014, SEC-006
#
# OpenAPI 3.1 specification for Case Execution (MOD-006).
# 16 endpoints: case lifecycle, gates, assignments, events, timeline.
# All errors follow RFC 9457 Problem Details.

openapi: "3.1.0"
info:
  title: EasyA2 API — Case Execution (MOD-006)
  version: "1.0.0"
  description: |
    Case Execution module: transforms published blueprints (MOD-005) into concrete
    case instances with stage transitions, gate resolution, role assignments,
    events, and interleaved timeline (3 independent histories).
    Motor de transição com 5 validações sequenciais obrigatórias.
    All errors follow RFC 9457 Problem Details.

servers:
  - url: /api/v1

tags:
  - name: case-execution
    description: "Case Execution (MOD-006): cases, gates, assignments, events, timeline"

# ============================================================================
# Paths
# ============================================================================
paths:
  # ---------- Cases - Lifecycle -----------------------------------------------
  /cases:
    post:
      operationId: cases_open
      tags: [case-execution]
      summary: Open a new case
      description: |
        Opens a case instance linked to a PUBLISHED cycle. Freezes cycle_version_id,
        generates código (CASO-{YYYY}-{SEQ5}), creates gate_instances PENDING for
        initial stage.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenCaseRequest"
      responses:
        "201":
          description: Case created
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenCaseResponse"
        "409":
          description: Idempotency-Key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: Cycle not published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

    get:
      operationId: cases_list
      tags: [case-execution]
      summary: List cases with filters
      description: |
        Cursor-based pagination. Supports filters by cycle, status, stage,
        date range, assigned_to_me, search (código), object_id (exact match).
      security:
        - bearerAuth: []
      parameters:
        - name: cycle_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [OPEN, COMPLETED, CANCELLED, ON_HOLD] }
        - name: stage_id
          in: query
          schema: { type: string, format: uuid }
        - name: assigned_to_me
          in: query
          schema: { type: boolean }
        - name: opened_after
          in: query
          schema: { type: string, format: date-time }
        - name: opened_before
          in: query
          schema: { type: string, format: date-time }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
        - name: object_id
          in: query
          description: Exact match via idx_case_instances_object (B-tree). Prevails over search.
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: Paginated case list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCasesResponse"

  /cases/{id}:
    get:
      operationId: cases_get
      tags: [case-execution]
      summary: Get case details
      description: Full case data including frozen blueprint, current gates, active assignments.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDetailResponse"
        "404":
          description: Case not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # ---------- Cases - Transition ----------------------------------------------
  /cases/{id}/transition:
    post:
      operationId: cases_transition
      tags: [case-execution]
      summary: Execute stage transition
      description: |
        5-step sequential validation: (1) case OPEN, (2) valid transition,
        (3) authorized role, (4) required gates resolved, (5) evidence if required.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionRequest"
      responses:
        "200":
          description: Transition executed
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransitionResponse"
        "403":
          description: Role not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: Validation failed (case not open, invalid transition, gates pending, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # ---------- Cases - Controls ------------------------------------------------
  /cases/{id}/cancel:
    post:
      operationId: cases_cancel
      tags: [case-execution]
      summary: Cancel case
      description: Cancels case with mandatory reason. Requires scope process:case:cancel.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRequest"
      responses:
        "200":
          description: Case cancelled
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlResponse"
        "422":
          description: Case cannot be cancelled in current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /cases/{id}/hold:
    post:
      operationId: cases_hold
      tags: [case-execution]
      summary: Put case on hold
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HoldRequest"
      responses:
        "200":
          description: Case on hold
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlResponse"

  /cases/{id}/resume:
    post:
      operationId: cases_resume
      tags: [case-execution]
      summary: Resume case from hold
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Case resumed
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlResponse"

  # ---------- Gates -----------------------------------------------------------
  /cases/{id}/gates:
    get:
      operationId: cases_gates_list
      tags: [case-execution]
      summary: List case gates
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - name: stage_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Gate instances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatesResponse"

  /cases/{id}/gates/{gateId}/resolve:
    post:
      operationId: cases_gates_resolve
      tags: [case-execution]
      summary: Resolve gate
      description: |
        Resolves gate by type: APPROVAL (decision + parecer), DOCUMENT (file evidence),
        CHECKLIST (all items checked).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/GateId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveGateRequest"
      responses:
        "200":
          description: Gate resolved
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveGateResponse"
        "403":
          description: Role lacks approval power
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: Checklist incomplete or gate already resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /cases/{id}/gates/{gateId}/waive:
    post:
      operationId: cases_gates_waive
      tags: [case-execution]
      summary: Waive gate
      description: Dispenses mandatory gate. Requires scope process:case:gate_waive and reason (min 20 chars).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/GateId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaiveGateRequest"
      responses:
        "200":
          description: Gate waived
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaiveGateResponse"
        "403":
          description: Missing scope process:case:gate_waive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: Reason too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # ---------- Assignments -----------------------------------------------------
  /cases/{id}/assignments:
    get:
      operationId: cases_assignments_list
      tags: [case-execution]
      summary: List case assignments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Assignment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssignmentsResponse"

    post:
      operationId: cases_assignments_create
      tags: [case-execution]
      summary: Assign responsible
      description: Assign user to role in stage. Auto-deactivates previous assignment for same role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRequest"
      responses:
        "201":
          description: Assignment created
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignResponse"

  /cases/{id}/assignments/{aid}:
    patch:
      operationId: cases_assignments_update
      tags: [case-execution]
      summary: Update assignment
      description: Update valid_until, is_active, or substitution_reason of an assignment.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/AssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssignmentRequest"
      responses:
        "200":
          description: Assignment updated
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssignmentResponse"

  # ---------- Events & Timeline -----------------------------------------------
  /cases/{id}/events:
    get:
      operationId: cases_events_list
      tags: [case-execution]
      summary: List case events
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventsResponse"

    post:
      operationId: cases_events_create
      tags: [case-execution]
      summary: Record event
      description: |
        Record standalone events: COMMENT, EXCEPTION, EVIDENCE, REOPENED.
        REOPENED requires scope process:case:reopen and mandatory target_stage_id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordEventRequest"
      responses:
        "201":
          description: Event recorded
          headers:
            X-Correlation-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordEventResponse"
        "403":
          description: Missing scope for REOPENED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: target_stage_id required for REOPENED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /cases/{id}/timeline:
    get:
      operationId: cases_timeline
      tags: [case-execution]
      summary: Interleaved timeline
      description: Merges 3 independent histories (stage_history, gate_instances, case_events) ordered by timestamp.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Timeline entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineResponse"

# ============================================================================
# Components
# ============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CaseId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    GateId:
      name: gateId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AssignmentId:
      name: aid
      in: path
      required: true
      schema: { type: string, format: uuid }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }

  schemas:
    # ── Shared ────────────────────────────────────────────────────────────────
    CaseStatus:
      type: string
      enum: [OPEN, COMPLETED, CANCELLED, ON_HOLD]
    GateResolutionStatus:
      type: string
      enum: [PENDING, RESOLVED, WAIVED, REJECTED]
    GateDecision:
      type: string
      enum: [APPROVED, REJECTED, WAIVED]
    CaseEventType:
      type: string
      enum: [COMMENT, EXCEPTION, REOPENED, EVIDENCE, REASSIGNED, ON_HOLD, RESUMED, STAGE_TRANSITIONED]

    ProblemDetails:
      type: object
      required: [type, title, status, detail]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        extensions: { type: object }

    Evidence:
      type: object
      properties:
        type: { type: string, enum: [note, file] }
        content: { type: string }
        url: { type: string, format: uri }

    FileEvidence:
      type: object
      required: [type, url, filename]
      properties:
        type: { type: string, enum: [file] }
        url: { type: string, format: uri }
        filename: { type: string, minLength: 1 }

    # ── Cases ─────────────────────────────────────────────────────────────────
    OpenCaseRequest:
      type: object
      required: [cycle_id]
      properties:
        cycle_id: { type: string, format: uuid }
        object_type: { type: string, maxLength: 100 }
        object_id: { type: string, format: uuid }
        org_unit_id: { type: string, format: uuid }

    OpenCaseResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        codigo: { type: string }
        cycle_id: { type: string, format: uuid }
        cycle_version_id: { type: string, format: uuid }
        current_stage_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/CaseStatus" }
        object_type: { type: string, nullable: true }
        object_id: { type: string, format: uuid, nullable: true }
        org_unit_id: { type: string, format: uuid, nullable: true }
        opened_by: { type: string, format: uuid }
        opened_at: { type: string, format: date-time }
        gate_instances:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              gate_id: { type: string, format: uuid }
              status: { type: string, enum: [PENDING] }
              gate_type: { type: string }

    TransitionRequest:
      type: object
      required: [transition_id]
      properties:
        transition_id: { type: string, format: uuid }
        evidence: { $ref: "#/components/schemas/Evidence" }
        motivo: { type: string, maxLength: 1000 }

    TransitionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        codigo: { type: string }
        current_stage_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/CaseStatus" }
        stage_history_entry:
          type: object
          properties:
            id: { type: string, format: uuid }
            from_stage_id: { type: string, format: uuid }
            to_stage_id: { type: string, format: uuid }
        new_gate_instances:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              gate_id: { type: string, format: uuid }
              status: { type: string, enum: [PENDING] }

    CancelRequest:
      type: object
      required: [motivo]
      properties:
        motivo: { type: string, minLength: 1, maxLength: 1000 }

    HoldRequest:
      type: object
      properties:
        motivo: { type: string, maxLength: 1000 }

    ControlResponse:
      type: object
      properties:
        previous_status: { $ref: "#/components/schemas/CaseStatus" }
        new_status: { $ref: "#/components/schemas/CaseStatus" }

    # ── Gates ─────────────────────────────────────────────────────────────────
    ResolveGateRequest:
      type: object
      properties:
        decision: { $ref: "#/components/schemas/GateDecision" }
        parecer: { type: string, maxLength: 2000 }
        evidence: { $ref: "#/components/schemas/FileEvidence" }
        checklist_items:
          type: array
          items:
            type: object
            required: [id, checked]
            properties:
              id: { type: string, format: uuid }
              label: { type: string }
              checked: { type: boolean }

    ResolveGateResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        gate_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/GateResolutionStatus" }
        decision: { $ref: "#/components/schemas/GateDecision", nullable: true }
        resolved_by: { type: string, format: uuid }
        resolved_at: { type: string, format: date-time }

    WaiveGateRequest:
      type: object
      required: [motivo]
      properties:
        motivo: { type: string, minLength: 20, maxLength: 2000 }

    WaiveGateResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        gate_id: { type: string, format: uuid }
        status: { type: string, enum: [WAIVED] }
        resolved_by: { type: string, format: uuid }
        resolved_at: { type: string, format: date-time }

    # ── Assignments ───────────────────────────────────────────────────────────
    AssignRequest:
      type: object
      required: [process_role_id, user_id, stage_id]
      properties:
        process_role_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid }
        delegation_id: { type: string, format: uuid }
        valid_until: { type: string, format: date-time }

    AssignResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        case_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid }
        process_role_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        is_active: { type: boolean }
        assigned_at: { type: string, format: date-time }
        replaced_assignment_id: { type: string, format: uuid, nullable: true }

    UpdateAssignmentRequest:
      type: object
      properties:
        valid_until: { type: string, format: date-time }
        is_active: { type: boolean }
        substitution_reason: { type: string, maxLength: 500 }

    UpdateAssignmentResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        case_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid }
        process_role_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        is_active: { type: boolean }
        assigned_at: { type: string, format: date-time }
        valid_until: { type: string, format: date-time, nullable: true }

    # ── Events & Timeline ─────────────────────────────────────────────────────
    RecordEventRequest:
      type: object
      required: [event_type, descricao]
      properties:
        event_type: { type: string, enum: [COMMENT, EXCEPTION, EVIDENCE, REOPENED] }
        descricao: { type: string, minLength: 1, maxLength: 2000 }
        metadata: { type: object }
        target_stage_id:
          type: string
          format: uuid
          description: Required when event_type=REOPENED

    RecordEventResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        case_id: { type: string, format: uuid }
        event_type: { $ref: "#/components/schemas/CaseEventType" }
        descricao: { type: string }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        stage_id: { type: string, format: uuid }

    TimelineEntry:
      type: object
      properties:
        type: { type: string, enum: [STAGE_CHANGE, GATE_RESOLVED, EVENT] }
        timestamp: { type: string, format: date-time }
        actor:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
        description: { type: string }
        metadata: { type: object }

    TimelineResponse:
      type: object
      properties:
        case_id: { type: string, format: uuid }
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEntry"

    # ── List Responses ────────────────────────────────────────────────────────
    CaseListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        codigo: { type: string }
        cycle_name: { type: string }
        current_stage_name: { type: string }
        status: { $ref: "#/components/schemas/CaseStatus" }
        pending_gates_count: { type: integer }
        my_role: { type: string, nullable: true }
        opened_at: { type: string, format: date-time }

    ListCasesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CaseListItem"
        nextCursor: { type: string, nullable: true }
        totalEstimate: { type: integer }

    CaseDetailResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        codigo: { type: string }
        cycle_id: { type: string, format: uuid }
        cycle_version_id: { type: string, format: uuid }
        current_stage_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/CaseStatus" }
        object_type: { type: string, nullable: true }
        object_id: { type: string, format: uuid, nullable: true }
        org_unit_id: { type: string, format: uuid, nullable: true }
        opened_by: { type: string, format: uuid }
        opened_at: { type: string, format: date-time }
