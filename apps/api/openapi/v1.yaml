# @contract EX-OAS-001, FR-001 to FR-017, MOD-003, MOD-004, MOD-005
#
# OpenAPI 3.1 specification for EasyA2 API (MOD-000 + MOD-003 + MOD-004 + MOD-005).
# Generated by AGN-COD-API. Keep in sync with route files.

openapi: "3.1.0"
info:
  title: EasyA2 API — Foundation + Org Structure + Identity Advanced + Process Modeling
  version: "1.4.0"
  description: |
    Foundation (MOD-000) + Organizational Structure (MOD-003) + Identity Advanced (MOD-004) + Process Modeling (MOD-005) API.
    All errors follow RFC 9457 Problem Details.

servers:
  - url: /api/v1

tags:
  - name: auth
    description: Authentication and session management
  - name: users
    description: User CRUD
  - name: roles
    description: Role and RBAC management
  - name: tenants
    description: Multi-tenant branch management
  - name: tenant-users
    description: User-tenant bindings
  - name: system
    description: System metadata
  - name: org-units
    description: "Organizational Structure (MOD-003): hierarchy N1\u2013N4 + tenant links"
  - name: identity-advanced
    description: "Identity Advanced (MOD-004): org scopes, access shares, delegations"
  - name: process-modeling
    description: "Process Modeling (MOD-005): cycles, macro-stages, stages, gates, roles, transitions"

# ============================================================================
# Paths
# ============================================================================
paths:
  # ---------- Auth ----------------------------------------------------------
  /auth/login:
    post:
      operationId: auth_login
      tags: [auth]
      summary: Native login with email and password
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful (or MFA required)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginResponse"
                  - $ref: "#/components/schemas/LoginMfaResponse"
        "401":
          $ref: "#/components/responses/ProblemDetails401"
        "429":
          $ref: "#/components/responses/ProblemDetails429"

  /auth/logout:
    post:
      operationId: auth_logout
      tags: [auth]
      summary: Logout — revokes current session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: "#/components/responses/ProblemDetails401"

  /auth/refresh:
    post:
      operationId: auth_refresh
      tags: [auth]
      summary: Refresh access token with rotation
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/ProblemDetails401"

  /auth/me:
    get:
      operationId: auth_get_profile
      tags: [auth]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/ProblemDetails401"
    patch:
      operationId: auth_update_profile
      tags: [auth]
      summary: Update own profile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/ProblemDetails401"

  /auth/change-password:
    post:
      operationId: auth_change_password
      tags: [auth]
      summary: Change password (requires current password)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessage"
        "400":
          $ref: "#/components/responses/ProblemDetails400"
        "401":
          $ref: "#/components/responses/ProblemDetails401"

  /auth/forgot-password:
    post:
      operationId: auth_forgot_password
      tags: [auth]
      summary: Request password reset email
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Always returns success (BR-001)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessage"

  /auth/reset-password:
    post:
      operationId: auth_reset_password
      tags: [auth]
      summary: Reset password with token
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessage"
        "422":
          $ref: "#/components/responses/ProblemDetails422"

  /auth/sessions:
    get:
      operationId: auth_list_sessions
      tags: [auth]
      summary: List active sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionItem"
    delete:
      operationId: auth_revoke_all_sessions
      tags: [auth]
      summary: Revoke all sessions (kill-switch)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: All sessions revoked

  /auth/sessions/{id}:
    delete:
      operationId: auth_revoke_session
      tags: [auth]
      summary: Revoke a specific session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Session revoked

  # ---------- Users ---------------------------------------------------------
  /users:
    post:
      operationId: users_create
      tags: [users]
      summary: Register new user (public or admin)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
        "422":
          $ref: "#/components/responses/ProblemDetails422"
    get:
      operationId: users_list
      tags: [users]
      summary: List users (paginated)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"

  /users/{id}:
    get:
      operationId: users_get
      tags: [users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
    patch:
      operationId: users_update
      tags: [users]
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
    delete:
      operationId: users_delete
      tags: [users]
      summary: Soft-delete user (LGPD)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: User soft-deleted

  # ---------- Roles ---------------------------------------------------------
  /roles:
    post:
      operationId: roles_create
      tags: [roles]
      summary: Create role with scopes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleCreateResponse"
    get:
      operationId: roles_list
      tags: [roles]
      summary: List roles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRoles"

  /roles/{id}:
    get:
      operationId: roles_get
      tags: [roles]
      summary: Get role detail with scopes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Role detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleDetailResponse"
    put:
      operationId: roles_update
      tags: [roles]
      summary: Update role — full scope replacement (BR-006)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleDetailResponse"
    delete:
      operationId: roles_delete
      tags: [roles]
      summary: Soft-delete role
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Role deleted

  # ---------- Tenants -------------------------------------------------------
  /tenants:
    post:
      operationId: tenants_create
      tags: [tenants]
      summary: Create tenant (branch)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantCreateResponse"
    get:
      operationId: tenants_list
      tags: [tenants]
      summary: List tenants
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTenants"

  /tenants/{id}:
    get:
      operationId: tenants_get
      tags: [tenants]
      summary: Get tenant detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDetailResponse"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
    patch:
      operationId: tenants_update
      tags: [tenants]
      summary: Update tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDetailResponse"
    delete:
      operationId: tenants_delete
      tags: [tenants]
      summary: Soft-delete tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Tenant deleted

  # ---------- Tenant-Users --------------------------------------------------
  /tenants/{tenantId}/users:
    post:
      operationId: tenant_users_add
      tags: [tenant-users]
      summary: Link user to tenant with role
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTenantUserRequest"
      responses:
        "201":
          description: User linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantUserAddResponse"
    get:
      operationId: tenant_users_list
      tags: [tenant-users]
      summary: List users of a tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Tenant user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTenantUsers"

  /tenants/{tenantId}/users/{userId}:
    delete:
      operationId: tenant_users_remove
      tags: [tenant-users]
      summary: Unlink user from tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User unlinked

  # ---------- System --------------------------------------------------------
  /info:
    get:
      operationId: system_get_info
      tags: [system]
      summary: System version and metadata (public)
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"

  # ---------- Org Units (MOD-003) --------------------------------------------
  /org-units:
    post:
      operationId: org_units_create
      tags: [org-units]
      summary: Create organizational unit (N1–N4)
      description: |
        Creates a new org unit. Nivel is derived from parent (BR-002).
        Supports Idempotency-Key header (BR-012).
        Emits X-Limit-Warning header when active nodes > 80% of soft limit.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgUnitRequest"
      responses:
        "201":
          description: Org unit created
          headers:
            X-Limit-Warning:
              schema: { type: string }
              description: Soft limit warning (when active nodes > 80% of 500)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUnitResponse"
        "409":
          $ref: "#/components/responses/ProblemDetails422"
        "422":
          $ref: "#/components/responses/ProblemDetails422"
      x-permissions:
        required: [org:unit:write]
    get:
      operationId: org_units_list
      tags: [org-units]
      summary: List org units (flat, paginated)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: nivel
          in: query
          schema: { type: integer, minimum: 1, maximum: 4 }
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, INACTIVE] }
        - name: parent_id
          in: query
          schema: { type: string, format: uuid }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: Paginated org unit list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrgUnits"
      x-permissions:
        required: [org:unit:read]

  /org-units/tree:
    get:
      operationId: org_units_tree
      tags: [org-units]
      summary: Full hierarchy tree (N1→N2→N3→N4→tenants)
      description: Returns nested tree via CTE recursivo. Soft-deleted nodes excluded.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Org unit tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUnitTreeResponse"
      x-permissions:
        required: [org:unit:read]

  /org-units/{id}:
    get:
      operationId: org_units_get
      tags: [org-units]
      summary: Get org unit detail with ancestors and tenants
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Org unit detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUnitDetailResponse"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
      x-permissions:
        required: [org:unit:read]
    patch:
      operationId: org_units_update
      tags: [org-units]
      summary: Update org unit (nome, descricao only)
      description: codigo and parent_id are immutable (BR-003, BR-010).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgUnitRequest"
      responses:
        "200":
          description: Org unit updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUnitUpdateResponse"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
        "422":
          $ref: "#/components/responses/ProblemDetails422"
      x-permissions:
        required: [org:unit:write]
    delete:
      operationId: org_units_delete
      tags: [org-units]
      summary: Soft-delete org unit (BR-005)
      description: Blocked if node has active children.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "200":
          description: Org unit soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessage"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
        "422":
          $ref: "#/components/responses/ProblemDetails422"
      x-permissions:
        required: [org:unit:delete]

  /org-units/{id}/restore:
    patch:
      operationId: org_units_restore
      tags: [org-units]
      summary: Restore soft-deleted org unit (BR-009)
      description: Parent must be active (or node is N1).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "200":
          description: Org unit restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessage"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
        "422":
          $ref: "#/components/responses/ProblemDetails422"
      x-permissions:
        required: [org:unit:write]

  /org-units/{id}/tenants:
    post:
      operationId: org_units_link_tenant
      tags: [org-units]
      summary: Link tenant (N5) to org unit N4 (BR-006)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkTenantRequest"
      responses:
        "201":
          description: Tenant linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTenantResponse"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
        "422":
          $ref: "#/components/responses/ProblemDetails422"
      x-permissions:
        required: [org:unit:write]

  /org-units/{id}/tenants/{tenantId}:
    delete:
      operationId: org_units_unlink_tenant
      tags: [org-units]
      summary: Unlink tenant from org unit
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: tenantId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "200":
          description: Tenant unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessage"
        "404":
          $ref: "#/components/responses/ProblemDetails404"
      x-permissions:
        required: [org:unit:delete]

  # ---------- Identity Advanced — Org Scopes (MOD-004 F01) ------------------
  /admin/users/{id}/org-scopes:
    get:
      operationId: admin_user_org_scopes_list
      tags: [identity-advanced]
      summary: List organizational scopes for a user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "200":
          description: Array of org scopes with breadcrumb
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgScopeListItem"
        "403":
          $ref: "#/components/responses/ProblemDetails403"
      x-permissions:
        required: [identity:org_scope:read]

    post:
      operationId: admin_user_org_scopes_create
      tags: [identity-advanced]
      summary: Create organizational scope (PRIMARY or SECONDARY)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/XCorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgScopeRequest"
      responses:
        "201":
          description: Org scope created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrgScopeResponse"
        "409":
          $ref: "#/components/responses/ProblemDetails409"
        "422":
          $ref: "#/components/responses/ProblemDetails422"
      x-permissions:
        required: [identity:org_scope:write]
        events:
          - identity.org_scope_granted

  /admin/users/{id}/org-scopes/{scopeId}:
    delete:
      operationId: admin_user_org_scopes_delete
      tags: [identity-advanced]
      summary: Revoke organizational scope (soft delete)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: scopeId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "204":
          description: Org scope revoked
        "404":
          $ref: "#/components/responses/ProblemDetails404"
      x-permissions:
        required: [identity:org_scope:write]
        events:
          - identity.org_scope_revoked

  /my/org-scopes:
    get:
      operationId: my_org_scopes
      tags: [identity-advanced]
      summary: Self-service — list own organizational scopes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "200":
          description: Own org scopes
          content:
            application/json:
              schema:
                type: array
                items:
