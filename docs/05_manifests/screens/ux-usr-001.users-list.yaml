    date: "2026-03-28"
    author: "arquitetura"
    description: "Backfill v1.1: shared_ui_components em todos os componentes, state_coverage top-level (DOC-UX-014 §1.1 list)."
  - version: "2.0.0"
    date: "2026-03-22"
    author: "arquitetura"
    description: "Reescrita para schema v1. Ações tipadas, telemetry_defaults padronizado, componentes detalhados, navegação e notas LGPD."
  - version: "1.1.0"
    date: "2026-03-17"
    author: "arquitetura"
    description: "Formato legado. Listagem com filtros, busca, paginação cursor-based e desativação."
